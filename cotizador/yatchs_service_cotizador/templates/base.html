{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'index.css' %}" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-dark d-flex w-100 w-lg-75 h-100">
        <div class="d-none d-lg-flex align-items-center justify-content-center bg-dark w-25 ">
            <!--side menu-->
            {% include "side-menu.html" %}
            
        </div>       
        <div class="bg-body-tertiary w-100 w-lg-75 pt-2 w-75" style="height: 100vh; overflow-y:auto;">
            {% include "formato-cotizacion.html" %}
        </div>
    </div>


<nav class="navbar navbar-dark bg-dark fixed-bottom d-lg-none">
  <ul class="nav justify-content-around w-100">
    <li class="nav-item"><a class="nav-link text-light" data-bs-toggle="modal" data-bs-target="#miModal" data-form="servicio">Servicios</a></li>
    <li class="nav-item"><a class="nav-link text-light" data-bs-toggle="modal" data-bs-target="#miModal" data-form="producto">Productos</a></li>
    <li class="nav-item"><a class="nav-link text-light" data-bs-toggle="modal" data-bs-target="#miModal" data-form="empresa">Empresas</a></li>
    <li class="nav-item"><a class="nav-link text-light" data-bs-toggle="modal" data-bs-target="#miModal" data-form="cliente">Clientes</a></li>
  </ul>
</nav>

{% include "modal-contenido.html" %}

    {% if messages %}
    <div class="toast-container position-fixed top-0 end-0 p-3">
    {% for message in messages %}
    <div class="toast align-items-center text-bg-{{ message.tags }} border-0" role="alert" data-bs-delay="2000">
        <div class="d-flex">
        <div class="toast-body">
            {{ message }}
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
    {% endfor %}
    </div>
    {% endif %}

<script>
document.addEventListener("DOMContentLoaded", function() {
    var toastElList = [].slice.call(document.querySelectorAll('.toast'))
    toastElList.forEach(function(toastEl) {
        new bootstrap.Toast(toastEl).show();
    });
});
</script>

</html>
